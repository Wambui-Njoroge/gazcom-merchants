<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - GAZCOM</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .product-details { max-width: 1200px; margin: 100px auto 2rem; padding: 2rem; }
        .product-container { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; background: white; border-radius: 20px; padding: 2rem; box-shadow: var(--shadow-sm); }
        .product-image { width: 100%; height: 400px; object-fit: contain; border-radius: 10px; }
        .product-title { font-size: 2rem; color: var(--jungle-green); margin-bottom: 0.5rem; }
        .product-category { color: var(--orange); margin-bottom: 1rem; }
        .product-stock { margin-bottom: 1rem; padding: 0.5rem; border-radius: 5px; display: inline-block; }
        .in-stock { background: #d4edda; color: #155724; }
        .out-of-stock { background: #f8d7da; color: #721c24; }
        .product-description { color: #666; line-height: 1.6; margin-bottom: 1.5rem; }
        .contact-buttons { display: flex; gap: 1rem; margin-top: 1.5rem; flex-wrap: wrap; }
        .inquire-btn, .call-btn, .whatsapp-btn { flex: 1; padding: 0.75rem; border: none; border-radius: 50px; cursor: pointer; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: all 0.3s ease; }
        .inquire-btn { background: linear-gradient(135deg, var(--orange), #ff8c42); color: white; }
        .inquire-btn:hover { background: linear-gradient(135deg, var(--jungle-green), var(--blue)); transform: translateY(-2px); }
        .call-btn { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; }
        .call-btn:hover { background: linear-gradient(135deg, var(--blue), var(--jungle-green)); transform: translateY(-2px); }
        .whatsapp-btn { background: linear-gradient(135deg, #25D366, #128C7E); color: white; }
        .whatsapp-btn:hover { transform: translateY(-2px); }
        .back-link { display: inline-block; margin-bottom: 1rem; color: var(--jungle-green); text-decoration: none; }
        .back-link:hover { color: var(--orange); }
        .loading { text-align: center; padding: 3rem; font-size: 1.2rem; }
        .error { text-align: center; padding: 3rem; color: red; }
        @media (max-width: 768px) {
            .product-container { grid-template-columns: 1fr; gap: 1.5rem; }
            .product-image { height: 250px; }
            .contact-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo-text">GAZCOM GENERAL MERCHANTS</div>
            <ul class="nav-menu">
                <li><a href="index.html">HOME</a></li>
                <li><a href="shop.html">SHOP</a></li>
                <li><a href="services.html">SERVICES</a></li>
                <li><a href="register.html">REGISTER</a></li>
                <li><a href="login.html">LOGIN</a></li>
            </ul>
        </div>
    </nav>

    <div class="product-details">
        <a href="shop.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Shop</a>
        <div id="product-content"><div class="loading">Loading product details...</div></div>
    </div>

    <script src="js/main.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        let currentProduct = null;
        
        async function loadProduct() {
            if (!productId) {
                document.getElementById('product-content').innerHTML = `<div class="error"><i class="fas fa-exclamation-circle"></i><h3>No product selected</h3><a href="shop.html" class="inquire-btn" style="display: inline-block; width: auto; padding: 0.5rem 1rem;">Go to Shop</a></div>`;
                return;
            }
            try {
                const response = await fetch(`/api/products/${productId}`);
                if (!response.ok) throw new Error('Product not found');
                const product = await response.json();
                currentProduct = product;
                displayProduct(product);
            } catch (error) {
                document.getElementById('product-content').innerHTML = `<div class="error"><i class="fas fa-exclamation-circle"></i><h3>Product not found</h3><a href="shop.html" class="inquire-btn" style="display: inline-block; width: auto; padding: 0.5rem 1rem;">Browse Products</a></div>`;
            }
        }
        
        function displayProduct(product) {
            const stockStatus = product.stock_quantity > 0 ? `<span class="product-stock in-stock"><i class="fas fa-check-circle"></i> In Stock (${product.stock_quantity} available)</span>` : `<span class="product-stock out-of-stock"><i class="fas fa-times-circle"></i> Out of Stock</span>`;
            const imageUrl = product.image_url || 'https://via.placeholder.com/400x400?text=No+Image';
            document.getElementById('product-content').innerHTML = `
                <div class="product-container">
                    <div><img src="${imageUrl}" alt="${product.name}" class="product-image" onerror="this.src='https://via.placeholder.com/400x400?text=Product'"></div>
                    <div>
                        <h1 class="product-title">${product.name}</h1>
                        <div class="product-category"><i class="fas fa-tag"></i> ${product.category_name || 'Petroleum Equipment'}</div>
                        ${stockStatus}
                        <div class="product-description">${product.description || 'No description available for this product.'}</div>
                        <div class="contact-buttons">
                            <button class="inquire-btn" onclick="inquireProduct(currentProduct)"><i class="fas fa-envelope"></i> Inquire via Email</button>
                            <button class="call-btn" onclick="makePhoneCall()"><i class="fas fa-phone"></i> Call Us</button>
                            <button class="whatsapp-btn" onclick="whatsappContact()"><i class="fab fa-whatsapp"></i> WhatsApp</button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        document.addEventListener('DOMContentLoaded', loadProduct);
    </script>
</body>
</html>
