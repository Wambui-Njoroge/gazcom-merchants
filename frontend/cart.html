<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - GAZCOM</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .cart-page {
            margin-top: 100px;
            padding: 2rem;
            max-width: 1200px;
            margin: 100px auto 2rem;
            min-height: 60vh;
        }
        .cart-header { text-align: center; margin-bottom: 2rem; }
        .cart-header h1 { color: var(--jungle-green); }
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .cart-item-info { flex: 2; }
        .cart-item-price { color: var(--orange); font-weight: bold; }
        .cart-item-quantity {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .quantity-btn {
            background: var(--jungle-green);
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 5px;
            cursor: pointer;
        }
        .remove-item {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        .cart-summary {
            background: white;
            padding: 1.5rem;
            border-radius: 10px;
            margin-top: 2rem;
            text-align: right;
        }
        .checkout-btn {
            background: var(--jungle-green);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 1rem;
        }
        .empty-cart { text-align: center; padding: 3rem; }
        .continue-shopping {
            background: var(--jungle-green);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo-text">GAZCOM GENERAL MERCHANTS</div>
            <ul class="nav-menu">
                <li><a href="index.html">HOME</a></li>
                <li><a href="shop.html">SHOP</a></li>
                <li><a href="cart.html">CART</a></li>
            </ul>
            <div class="cart-icon">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count">0</span>
            </div>
        </div>
    </nav>

    <div class="cart-page">
        <div class="cart-header">
            <h1>Shopping Cart</h1>
        </div>
        <div id="cart-items"></div>
        <div id="cart-summary"></div>
    </div>

    <script>
        // Get cart from localStorage
        function getCart() {
            const cartData = localStorage.getItem('cart');
            if (!cartData) return [];
            try {
                return JSON.parse(cartData);
            } catch(e) {
                return [];
            }
        }
        
        // Save cart
        function saveCart(cart) {
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
        }
        
        // Update cart count badge
        function updateCartCount() {
            const cart = getCart();
            const total = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
            const countElement = document.querySelector('.cart-count');
            if (countElement) countElement.textContent = total;
        }
        
        // Display cart
        function displayCart() {
            const cart = getCart();
            const itemsContainer = document.getElementById('cart-items');
            const summaryContainer = document.getElementById('cart-summary');
            
            if (cart.length === 0) {
                itemsContainer.innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-shopping-cart" style="font-size: 48px; color: #ccc;"></i>
                        <h3>Your cart is empty</h3>
                        <button class="continue-shopping" onclick="window.location.href='shop.html'">Continue Shopping</button>
                    </div>
                `;
                summaryContainer.innerHTML = '';
                return;
            }
            
            let subtotal = 0;
            
            itemsContainer.innerHTML = cart.map((item, index) => {
                const itemTotal = (item.price || 0) * (item.quantity || 1);
                subtotal += itemTotal;
                return `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <h3>${item.name || 'Product'}</h3>
                            <div class="cart-item-price">KES ${(item.price || 0).toLocaleString()}</div>
                        </div>
                        <div class="cart-item-quantity">
                            <button class="quantity-btn" onclick="updateQuantity(${index}, ${(item.quantity || 1) - 1})">-</button>
                            <span>${item.quantity || 1}</span>
                            <button class="quantity-btn" onclick="updateQuantity(${index}, ${(item.quantity || 1) + 1})">+</button>
                        </div>
                        <div>KES ${itemTotal.toLocaleString()}</div>
                        <button class="remove-item" onclick="removeItem(${index})">Remove</button>
                    </div>
                `;
            }).join('');
            
            summaryContainer.innerHTML = `
                <div class="cart-summary">
                    <h3>Order Summary</h3>
                    <p>Subtotal: KES ${subtotal.toLocaleString()}</p>
                    <p>Shipping: Free</p>
                    <hr>
                    <h2>Total: KES ${subtotal.toLocaleString()}</h2>
                    <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
                </div>
            `;
        }
        
        function updateQuantity(index, newQuantity) {
            if (newQuantity < 1) {
                removeItem(index);
                return;
            }
            const cart = getCart();
            cart[index].quantity = newQuantity;
            saveCart(cart);
            displayCart();
            showNotification('Cart updated');
        }
        
        function removeItem(index) {
            const cart = getCart();
            const removed = cart[index];
            cart.splice(index, 1);
            saveCart(cart);
            displayCart();
            showNotification(`${removed.name} removed`);
        }
        
        function checkout() {
            const token = localStorage.getItem('token');
            if (!token) {
                showNotification('Please login first', 'error');
                setTimeout(() => window.location.href = 'login.html', 1500);
                return;
            }
            window.location.href = 'checkout.html';
        }
        
        function showNotification(msg, type = 'success') {
            const notif = document.createElement('div');
            notif.textContent = msg;
            notif.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: ${type === 'error' ? '#e74c3c' : '#2ecc71'};
                color: white;
                padding: 10px 20px;
                border-radius: 5px;
                z-index: 10000;
            `;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 2000);
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            displayCart();
            updateCartCount();
        });
        
        window.updateQuantity = updateQuantity;
        window.removeItem = removeItem;
        window.checkout = checkout;
    </script>
</body>
</html>
