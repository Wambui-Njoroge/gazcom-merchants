<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - GAZCOM</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .checkout-container {
            margin-top: 100px;
            padding: 2rem;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .checkout-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .checkout-header h1 {
            color: var(--jungle-green);
            font-size: 2.5rem;
            font-weight: 700;
        }
        
        .checkout-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 2rem;
        }
        
        /* Checkout Form */
        .checkout-form {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--shadow-sm);
        }
        
        .form-section {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid #eee;
        }
        
        .form-section h3 {
            color: var(--jungle-green);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--dark-gray);
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--orange);
            box-shadow: 0 0 0 3px rgba(255,107,53,0.1);
        }
        
        /* Payment Methods */
        .payment-methods {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .payment-method {
            flex: 1;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .payment-method:hover {
            border-color: var(--orange);
        }
        
        .payment-method.active {
            border-color: var(--jungle-green);
            background: rgba(44, 95, 45, 0.05);
        }
        
        .payment-method i {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .payment-method .mpesa {
            color: #4CAF50;
        }
        
        .payment-method .card {
            color: #2196F3;
        }
        
        .payment-details {
            background: #f8fafc;
            border-radius: 12px;
            padding: 1.5rem;
            margin-top: 1rem;
        }
        
        /* Order Summary */
        .order-summary {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 100px;
            height: fit-content;
        }
        
        .order-summary h3 {
            color: var(--jungle-green);
            margin-bottom: 1.5rem;
        }
        
        .cart-items {
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 1rem;
        }
        
        .cart-item {
            display: flex;
            gap: 1rem;
            padding: 0.75rem 0;
            border-bottom: 1px solid #eee;
        }
        
        .cart-item-image {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 10px;
        }
        
        .cart-item-details {
            flex: 1;
        }
        
        .cart-item-name {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        
        .cart-item-price {
            color: var(--orange);
            font-size: 0.9rem;
        }
        
        .cart-item-quantity {
            color: var(--gray-600);
            font-size: 0.85rem;
        }
        
        .cart-item-total {
            font-weight: 600;
            color: var(--jungle-green);
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid #eee;
        }
        
        .summary-row.total {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--orange);
            border-bottom: none;
            padding-top: 1rem;
            margin-top: 0.5rem;
        }
        
        .place-order-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--jungle-green), var(--blue));
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1.5rem;
            transition: all 0.3s ease;
        }
        
        .place-order-btn:hover {
            background: linear-gradient(135deg, var(--orange), #ff8c42);
            transform: translateY(-2px);
        }
        
        .empty-cart {
            text-align: center;
            padding: 3rem;
        }
        
        .mpesa-input {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        
        .mpesa-input input {
            flex: 1;
        }
        
        .mpesa-hint {
            font-size: 0.85rem;
            color: var(--gray-600);
            margin-top: 0.5rem;
        }
        
        @media (max-width: 768px) {
            .checkout-container {
                margin-top: 80px;
                padding: 1rem;
            }
            
            .checkout-grid {
                grid-template-columns: 1fr;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .payment-methods {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <img src="images/logo.png" alt="GAZCOM" class="logo-img" onerror="this.src='https://via.placeholder.com/50?text=G'">
                <span class="logo-text">GAZCOM GENERAL MERCHANTS</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">HOME</a></li>
                <li><a href="shop.html">SHOP</a></li>
                <li><a href="cart.html">CART</a></li>
            </ul>
            <div class="cart-icon">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count">0</span>
            </div>
        </div>
    </nav>

    <div class="checkout-container">
        <div class="checkout-header">
            <h1>Checkout</h1>
            <p>Complete your order</p>
        </div>
        
        <div id="checkout-content"></div>
    </div>

    <footer>
        <div class="footer-content">
            <div class="footer-section">
                <h3>GAZCOM GENERAL MERCHANTS</h3>
                <p>Your trusted partner in petroleum equipment</p>
            </div>
            <div class="footer-section">
                <h4>Quick Links</h4>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="shop.html">Shop</a></li>
                    <li><a href="cart.html">Cart</a></li>
                </ul>
            </div>
            <div class="footer-section">
                <h4>Contact</h4>
                <p><i class="fas fa-phone"></i> +254 724 515 819</p>
                <p><i class="fas fa-envelope"></i> gazcom.gm@gmail.com</p>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 GAZCOM GENERAL MERCHANTS. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        let cart = [];
        let subtotal = 0;
        let selectedPayment = 'mpesa';
        
        function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return false;
            }
            return true;
        }
        
        function loadCart() {
            cart = JSON.parse(localStorage.getItem('cart')) || [];
            
            if (cart.length === 0) {
                document.getElementById('checkout-content').innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-shopping-cart" style="font-size: 4rem; color: #ccc;"></i>
                        <h3>Your cart is empty</h3>
                        <p>Add items to your cart before checking out.</p>
                        <button class="place-order-btn" onclick="window.location.href='shop.html'" style="width: auto; padding: 0.75rem 2rem;">
                            Continue Shopping
                        </button>
                    </div>
                `;
                return false;
            }
            return true;
        }
        
        function displayCheckout() {
            const container = document.getElementById('checkout-content');
            
            subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const total = subtotal;
            
            container.innerHTML = `
                <div class="checkout-grid">
                    <div class="checkout-form">
                        <form id="checkout-form">
                            <div class="form-section">
                                <h3><i class="fas fa-user"></i> Personal Information</h3>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>Full Name *</label>
                                        <input type="text" id="fullName" required>
                                    </div>
                                    <div class="form-group">
                                        <label>Email *</label>
                                        <input type="email" id="email" required>
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Phone Number *</label>
                                    <input type="tel" id="phone" required placeholder="0712345678">
                                </div>
                            </div>
                            
                            <div class="form-section">
                                <h3><i class="fas fa-map-marker-alt"></i> Shipping Address</h3>
                                <div class="form-group">
                                    <label>Street Address *</label>
                                    <input type="text" id="address" required placeholder="Building/House number, Street name">
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>City *</label>
                                        <input type="text" id="city" required placeholder="Nairobi">
                                    </div>
                                    <div class="form-group">
                                        <label>Postal Code</label>
                                        <input type="text" id="postalCode" placeholder="00100">
                                    </div>
                                </div>
                            </div>
                            
                            <div class="form-section">
                                <h3><i class="fas fa-credit-card"></i> Payment Method</h3>
                                <div class="payment-methods">
                                    <div class="payment-method ${selectedPayment === 'mpesa' ? 'active' : ''}" onclick="selectPayment('mpesa')">
                                        <i class="fas fa-mobile-alt mpesa"></i>
                                        <div><strong>M-Pesa</strong></div>
                                        <small>Pay with M-Pesa</small>
                                    </div>
                                    <div class="payment-method ${selectedPayment === 'card' ? 'active' : ''}" onclick="selectPayment('card')">
                                        <i class="fas fa-credit-card card"></i>
                                        <div><strong>Card</strong></div>
                                        <small>Credit/Debit Card</small>
                                    </div>
                                </div>
                                
                                <div id="payment-details" class="payment-details"></div>
                            </div>
                        </form>
                    </div>
                    
                    <div class="order-summary">
                        <h3>Order Summary</h3>
                        <div class="cart-items">
                            ${cart.map(item => `
                                <div class="cart-item">
                                    <img src="${item.image_url || 'https://via.placeholder.com/60'}" alt="${item.name}" class="cart-item-image">
                                    <div class="cart-item-details">
                                        <div class="cart-item-name">${item.name}</div>
                                        <div class="cart-item-price">KES ${item.price.toLocaleString()}</div>
                                        <div class="cart-item-quantity">Quantity: ${item.quantity}</div>
                                    </div>
                                    <div class="cart-item-total">KES ${(item.price * item.quantity).toLocaleString()}</div>
                                </div>
                            `).join('')}
                        </div>
                        
                        <div class="summary-row">
                            <span>Subtotal</span>
                            <span>KES ${subtotal.toLocaleString()}</span>
                        </div>
                        <div class="summary-row">
                            <span>Shipping</span>
                            <span>Free</span>
                        </div>
                        <div class="summary-row total">
                            <span>Total</span>
                            <span>KES ${total.toLocaleString()}</span>
                        </div>
                        
                        <button class="place-order-btn" onclick="placeOrder()">
                            <i class="fas fa-check-circle"></i> Place Order
                        </button>
                    </div>
                </div>
            `;
            
            // Load user data if available
            loadUserData();
            updatePaymentDetails();
        }
        
        function selectPayment(method) {
            selectedPayment = method;
            document.querySelectorAll('.payment-method').forEach(el => el.classList.remove('active'));
            event.target.closest('.payment-method').classList.add('active');
            updatePaymentDetails();
        }
        
        function updatePaymentDetails() {
            const container = document.getElementById('payment-details');
            
            if (selectedPayment === 'mpesa') {
                container.innerHTML = `
                    <div class="mpesa-input">
                        <div style="flex: 1;">
                            <label>M-Pesa Phone Number</label>
                            <input type="tel" id="mpesaPhone" placeholder="0712345678">
                            <div class="mpesa-hint">
                                <i class="fas fa-info-circle"></i> 
                                You will receive a prompt on your phone to complete payment
                            </div>
                        </div>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="form-group">
                        <label>Card Number</label>
                        <input type="text" id="cardNumber" placeholder="1234 5678 9012 3456">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Expiry Date</label>
                            <input type="text" id="expiry" placeholder="MM/YY">
                        </div>
                        <div class="form-group">
                            <label>CVV</label>
                            <input type="text" id="cvv" placeholder="123">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Cardholder Name</label>
                        <input type="text" id="cardName" placeholder="Name on card">
                    </div>
                `;
            }
        }
        
        async function loadUserData() {
            const token = localStorage.getItem('token');
            try {
                const response = await fetch('/api/auth/verify', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.valid && data.user) {
                    document.getElementById('fullName').value = data.user.full_name || '';
                    document.getElementById('email').value = data.user.email || '';
                    document.getElementById('phone').value = data.user.phone || '';
                }
            } catch (error) {
                console.error('Error loading user data:', error);
            }
        }
        
        async function placeOrder() {
            // Validate form
            const fullName = document.getElementById('fullName')?.value;
            const email = document.getElementById('email')?.value;
            const phone = document.getElementById('phone')?.value;
            const address = document.getElementById('address')?.value;
            const city = document.getElementById('city')?.value;
            
            if (!fullName || !email || !phone || !address || !city) {
                showNotification('Please fill in all required fields', 'error');
                return;
            }
            
            const shippingAddress = `${address}, ${city}`;
            const totalAmount = subtotal;
            
            const orderData = {
                shipping_address: shippingAddress,
                items: cart,
                total_amount: totalAmount,
                payment_method: selectedPayment,
                customer: {
                    name: fullName,
                    email: email,
                    phone: phone
                }
            };
            
            const token = localStorage.getItem('token');
            const submitBtn = document.querySelector('.place-order-btn');
            const originalText = submitBtn.innerHTML;
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
            
            try {
                const response = await fetch('/api/orders', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(orderData)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Clear cart
                    localStorage.removeItem('cart');
                    updateCartCount();
                    
                    showNotification('Order placed successfully! 🎉', 'success');
                    
                    // Redirect to order history
                    setTimeout(() => {
                        window.location.href = 'order-history.html';
                    }, 2000);
                } else {
                    showNotification(data.error || 'Order failed. Please try again.', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalText;
                }
            } catch (error) {
                console.error('Order error:', error);
                showNotification('Network error. Please try again.', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        }
        
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            notification.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: ${type === 'success' ? '#2ecc71' : '#e74c3c'};
                color: white;
                padding: 12px 24px;
                border-radius: 8px;
                z-index: 10000;
                animation: slideIn 0.3s ease;
            `;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (checkAuth()) {
                if (loadCart()) {
                    displayCheckout();
                }
                updateCartCount();
            }
        });
        
        // Add animation styles
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
        `;
        document.head.appendChild(style);
        
        // Make functions global
        window.selectPayment = selectPayment;
        window.placeOrder = placeOrder;
    </script>
</body>
</html>
