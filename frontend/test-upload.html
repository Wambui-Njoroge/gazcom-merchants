<!DOCTYPE html>
<html>
<head>
    <title>Test Cloudinary Upload</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .upload-area { border: 2px dashed #ccc; padding: 20px; text-align: center; margin: 20px 0; }
        img { max-width: 300px; margin-top: 10px; }
        .success { background: #d4edda; padding: 15px; border-radius: 5px; color: #155724; }
        .error { background: #f8d7da; padding: 15px; border-radius: 5px; color: #721c24; }
    </style>
</head>
<body>
    <h1>Test Cloudinary Image Upload</h1>
    
    <div class="upload-area">
        <input type="file" id="imageInput" accept="image/*">
        <div id="preview"></div>
    </div>
    
    <button onclick="uploadImage()">Upload to Cloudinary</button>
    <div id="result"></div>

    <script>
        let selectedFile = null;
        
        document.getElementById('imageInput').addEventListener('change', (e) => {
            selectedFile = e.target.files[0];
            const preview = document.getElementById('preview');
            if (selectedFile) {
                preview.innerHTML = `<img src="${URL.createObjectURL(selectedFile)}" style="max-width: 200px; margin-top: 10px;">`;
            }
        });
        
        async function uploadImage() {
            if (!selectedFile) {
                alert('Please select an image first');
                return;
            }
            
            const token = localStorage.getItem('token');
            if (!token) {
                alert('Please login as admin first');
                window.location.href = 'login.html';
                return;
            }
            
            const formData = new FormData();
            formData.append('image', selectedFile);
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Uploading...</p>';
            
            try {
                const response = await fetch('/api/upload/image', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    },
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            <h3>✅ Upload Successful!</h3>
                            <p><strong>URL:</strong> <a href="${data.url}" target="_blank">${data.url}</a></p>
                            <p><strong>Public ID:</strong> ${data.public_id}</p>
                            <img src="${data.url}" style="max-width: 300px; margin-top: 10px;">
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `<div class="error">❌ Error: ${data.error}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">❌ Network error: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
