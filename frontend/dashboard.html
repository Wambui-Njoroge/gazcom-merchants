<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - GAZCOM</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .dashboard-container {
            margin-top: 100px;
            padding: 2rem;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
            min-height: 60vh;
        }
        .dashboard-header {
            background: linear-gradient(135deg, var(--jungle-green), var(--blue));
            border-radius: 20px;
            padding: 2rem;
            color: white;
            margin-bottom: 2rem;
        }
        .dashboard-header h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .dashboard-grid {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
        }
        .dashboard-sidebar {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            height: fit-content;
            position: sticky;
            top: 100px;
        }
        .user-avatar { text-align: center; margin-bottom: 1.5rem; }
        .avatar-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--jungle-green), var(--orange));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }
        .avatar-circle i { font-size: 2.5rem; color: white; }
        .user-name { font-size: 1.2rem; font-weight: 700; color: var(--dark-gray); }
        .user-email { font-size: 0.85rem; color: var(--gray-600); margin-top: 0.25rem; }
        .sidebar-menu { list-style: none; margin-top: 1.5rem; }
        .sidebar-menu li { margin-bottom: 0.5rem; }
        .sidebar-menu a {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: var(--dark-gray);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .sidebar-menu a:hover, .sidebar-menu a.active {
            background: linear-gradient(135deg, rgba(44, 95, 45, 0.1), rgba(255, 107, 53, 0.1));
            color: var(--orange);
        }
        .sidebar-menu a i { width: 24px; }
        .logout-btn { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid #eee; }
        .logout-btn a { color: #e74c3c; cursor: pointer; display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: 12px; }
        .logout-btn a:hover { background: rgba(231, 76, 60, 0.1); }
        .dashboard-content {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: var(--shadow-sm);
            min-height: 400px;
        }
        .section-title {
            font-size: 1.5rem;
            color: var(--jungle-green);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .profile-form { max-width: 600px; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--dark-gray); }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
        }
        .form-group input:focus { outline: none; border-color: var(--orange); }
        .form-group input:disabled { background: #f5f5f5; }
        .btn-save {
            background: linear-gradient(135deg, var(--jungle-green), var(--blue));
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-save:hover { background: linear-gradient(135deg, var(--orange), #ff8c42); }
        .orders-list { display: flex; flex-direction: column; gap: 1rem; }
        .order-card {
            border: 1px solid #eee;
            border-radius: 16px;
            padding: 1.25rem;
            transition: all 0.3s ease;
        }
        .order-card:hover { box-shadow: var(--shadow-sm); border-color: var(--orange); }
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
        .order-number { font-weight: 700; color: var(--jungle-green); }
        .order-status { padding: 0.25rem 0.75rem; border-radius: 50px; font-size: 0.75rem; font-weight: 600; }
        .status-pending { background: #fff3e0; color: #f39c12; }
        .order-date { color: var(--gray-600); font-size: 0.85rem; }
        .order-total { font-weight: 700; color: var(--orange); font-size: 1.1rem; }
        .empty-state { text-align: center; padding: 3rem; color: var(--gray-600); }
        .empty-state i { font-size: 4rem; margin-bottom: 1rem; color: var(--gray-400); }
        .loading-spinner { text-align: center; padding: 2rem; }
        .loading-spinner i { font-size: 2rem; color: var(--orange); animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 768px) {
            .dashboard-container { margin-top: 80px; padding: 1rem; }
            .dashboard-grid { grid-template-columns: 1fr; gap: 1.5rem; }
        }
    </style>
</head>
<body>
    <!-- IMMEDIATE AUTH CHECK - Runs before anything else -->
    <script>
        (function() {
            const token = localStorage.getItem('token');
            const user = localStorage.getItem('user');
            
            console.log('Dashboard auth check - Token exists:', !!token);
            console.log('Dashboard auth check - User exists:', !!user);
            
            // No token or no user - redirect to login
            if (!token || !user) {
                console.log('No auth found, redirecting to login');
                window.location.href = 'login.html';
                return;
            }
            
            try {
                const userData = JSON.parse(user);
                console.log('User role:', userData.role);
                
                // Admin users go to admin panel
                if (userData.role === 'admin') {
                    console.log('Admin user redirected to admin panel');
                    window.location.href = 'admin.html';
                    return;
                }
                
                console.log('Regular user - access granted to dashboard');
            } catch(e) {
                console.error('Error parsing user data:', e);
                window.location.href = 'login.html';
            }
        })();
    </script>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-text">GAZCOM GENERAL MERCHANTS</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">HOME</a></li>
                <li><a href="shop.html">SHOP</a></li>
                <li><a href="services.html">SERVICES</a></li>
            </ul>
            <div class="cart-icon">
                <i class="fas fa-shopping-cart"></i>
                <span class="cart-count">0</span>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1>My Dashboard</h1>
            <p>Welcome back! Manage your account and orders</p>
        </div>

        <div class="dashboard-grid">
            <div class="dashboard-sidebar">
                <div class="user-avatar">
                    <div class="avatar-circle">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="user-name" id="user-name">Loading...</div>
                    <div class="user-email" id="user-email">Loading...</div>
                </div>
                <ul class="sidebar-menu">
                    <li><a onclick="showSection('profile')" class="active" id="profile-link">
                            <i class="fas fa-user-circle"></i> Profile
                        </a></li>
                    <li><a onclick="showSection('orders')" id="orders-link">
                            <i class="fas fa-shopping-bag"></i> My Orders
                        </a></li>
                </ul>
                <div class="logout-btn">
                    <a onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </div>
            </div>

            <div class="dashboard-content">
                <div id="profile-section">
                    <div class="section-title">
                        <i class="fas fa-user-circle"></i>
                        <span>Profile Information</span>
                    </div>
                    <form class="profile-form" id="profile-form">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" id="profile-username" disabled>
                        </div>
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="profile-fullname">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="profile-email">
                        </div>
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="tel" id="profile-phone">
                        </div>
                        <button type="submit" class="btn-save">Update Profile</button>
                    </form>
                </div>

                <div id="orders-section" style="display: none;">
                    <div class="section-title">
                        <i class="fas fa-shopping-bag"></i>
                        <span>My Orders</span>
                    </div>
                    <div id="orders-list">
                        <div class="loading-spinner">
                            <i class="fas fa-spinner fa-spin"></i>
                            <p>Loading your orders...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        let currentUser = null;

        async function loadUserData() {
            const token = localStorage.getItem('token');
            if (!token) return;
            
            try {
                const response = await fetch('/api/auth/verify', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.valid && data.user) {
                    currentUser = data.user;
                    displayUserInfo();
                }
            } catch (error) {
                console.error('Error loading user data:', error);
            }
        }

        function displayUserInfo() {
            if (!currentUser) return;
            document.getElementById('user-name').textContent = currentUser.full_name || currentUser.username;
            document.getElementById('user-email').textContent = currentUser.email;
            document.getElementById('profile-username').value = currentUser.username;
            document.getElementById('profile-fullname').value = currentUser.full_name || '';
            document.getElementById('profile-email').value = currentUser.email;
            document.getElementById('profile-phone').value = currentUser.phone || '';
        }

        async function updateProfile(e) {
            e.preventDefault();
            const token = localStorage.getItem('token');
            
            const updatedData = {
                full_name: document.getElementById('profile-fullname').value,
                email: document.getElementById('profile-email').value,
                phone: document.getElementById('profile-phone').value
            };
            
            try {
                const response = await fetch('/api/auth/update-profile', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(updatedData)
                });
                
                if (response.ok) {
                    const updatedUser = await response.json();
                    currentUser = updatedUser;
                    localStorage.setItem('user', JSON.stringify(updatedUser));
                    displayUserInfo();
                    showNotification('Profile updated successfully!', 'success');
                } else {
                    showNotification('Error updating profile', 'error');
                }
            } catch (error) {
                showNotification('Network error', 'error');
            }
        }

        async function loadOrders() {
            const token = localStorage.getItem('token');
            const container = document.getElementById('orders-list');
            
            container.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner fa-spin"></i><p>Loading your orders...</p></div>';
            
            try {
                const response = await fetch('/api/orders', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const orders = await response.json();
                
                if (!orders || orders.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-shopping-bag"></i>
                            <p>You haven't placed any orders yet</p>
                            <a href="shop.html" class="btn-save" style="display: inline-block; margin-top: 1rem;">Start Shopping</a>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = `
                    <div class="orders-list">
                        ${orders.map(order => `
                            <div class="order-card">
                                <div class="order-header">
                                    <div>
                                        <span class="order-number">Order #${order.order_number || order.id}</span>
                                        <span class="order-status status-${order.status}">${order.status || 'pending'}</span>
                                    </div>
                                    <div class="order-total">KES ${Number(order.total_amount || 0).toLocaleString()}</div>
                                </div>
                                <div class="order-date">
                                    <i class="far fa-calendar-alt"></i> ${new Date(order.created_at).toLocaleDateString()}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>Unable to load orders. Please try again later.</p>
                    </div>
                `;
            }
        }

        function showSection(section) {
            document.querySelectorAll('.sidebar-menu a').forEach(link => link.classList.remove('active'));
            document.getElementById(`${section}-link`).classList.add('active');
            document.getElementById('profile-section').style.display = section === 'profile' ? 'block' : 'none';
            document.getElementById('orders-section').style.display = section === 'orders' ? 'block' : 'none';
            if (section === 'orders') loadOrders();
        }

        function logout() {
            localStorage.removeItem('cart');
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            if (typeof updateCartCount === 'function') updateCartCount();
            window.location.href = 'index.html';
        }

        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            notification.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: ${type === 'error' ? '#e74c3c' : '#2ecc71'};
                color: white;
                padding: 12px 20px;
                border-radius: 8px;
                z-index: 10000;
                animation: slideIn 0.3s ease;
                cursor: pointer;
            `;
            notification.onclick = () => notification.remove();
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await loadUserData();
            document.getElementById('profile-form').addEventListener('submit', updateProfile);
            if (typeof updateCartCount === 'function') updateCartCount();
        });

        window.showSection = showSection;
        window.logout = logout;
    </script>
</body>
</html>
